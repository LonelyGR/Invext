events {}

http {
  upstream backend_app {
    server app:8000;
  }

  upstream admin_frontend {
    server admin-frontend:80;
  }

  # HTTP -> HTTPS redirect
  server {
    listen 80;
    server_name invext.online;

    return 301 https://$host$request_uri;
  }

  # HTTPS
  server {
    listen 443 ssl;
    server_name invext.online;

    ssl_certificate     /etc/letsencrypt/live/invext.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/invext.online/privkey.pem;

    # Статический админ-фронтенд
    location /database/ {
      proxy_pass http://admin_frontend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API бэкенда для админки
    location /database/api/ {
      proxy_pass http://backend_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Остальные запросы (включая /crypto/webhook) на backend
    location / {
      proxy_pass http://backend_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

