events {}

http {
  # Docker DNS resolver: позволяет nginx переопределять IP сервисов после их рестарта.
  resolver 127.0.0.11 ipv6=off valid=30s;

  # HTTP -> HTTPS redirect
  server {
    listen 80;
    server_name invext.online;

    return 301 https://$host$request_uri;
  }

  # HTTPS
  server {
    listen 443 ssl;
    server_name invext.online;

    ssl_certificate     /etc/letsencrypt/live/invext.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/invext.online/privkey.pem;

    # Статический админ-фронтенд
    location /database/ {
      set $admin_frontend_upstream admin-frontend:80;
      proxy_pass http://$admin_frontend_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API бэкенда для админки
    location /database/api/ {
      set $backend_upstream app:8000;
      proxy_pass http://$backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Остальные запросы (включая /crypto/webhook) на backend
    location / {
      set $backend_upstream app:8000;
      proxy_pass http://$backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

