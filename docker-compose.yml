services:
  db:
    image: postgres:15-alpine
    container_name: invext_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: invext
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d invext"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invext_app
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/invext
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: invext_bot
    env_file: .env
    environment:
      BACKEND_BASE_URL: http://app:8000
    depends_on:
      app:
        condition: service_healthy
    command: python -m src.main

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: invext_admin_frontend

  nginx:
    image: nginx:alpine
    container_name: invext_nginx
    depends_on:
      - app
      - admin-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
